---
# Ravenline software graph — built-in kinds only. Aspect enrollment and vísir
# references ride annotations (design §5): inert today, consumed by the future
# scorecard/runbooks plugins.
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata: { name: ravenline }
spec: { owner: group:default/ravenline }
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: parcel-tracking, description: Parcel tracking product }
spec: { owner: group:default/team-tracking, domain: ravenline }
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tracking-api
  description: 'Tracking event ingest + query API. Security standard: silver.'
  annotations:
    siliconsaga.org/aspects: 'security, operational-readiness'
    siliconsaga.org/visir: './repos/tracking-api/docs/runbooks/queue-backlog.md'
    backstage.io/techdocs-ref: dir:./repos/tracking-api
spec: { type: service, lifecycle: production, owner: group:default/team-tracking, system: parcel-tracking }
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata: { name: tracking-web, description: Customer-facing tracking page }
spec: { type: website, lifecycle: production, owner: group:default/team-tracking, system: parcel-tracking }
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: shipping, description: Shipping orchestration product }
spec: { owner: group:default/team-shipping, domain: ravenline }
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: shipping-orchestrator
  description: 'Books carriers, prints labels. Security standard: silver.'
  annotations:
    siliconsaga.org/aspects: 'security'
spec: { type: service, lifecycle: production, owner: group:default/team-shipping, system: shipping }
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: carrier-gateway
  description: 'Adapters for carrier APIs. Security standard: bronze — dependency-scanning trial failing; remediation = adopt the paved-road pipeline template.'
  annotations:
    siliconsaga.org/aspects: 'security'
spec: { type: service, lifecycle: production, owner: group:default/team-shipping, system: shipping }
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: rl-platform, description: Shared platform }
spec: { owner: group:default/team-platform, domain: ravenline }
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata: { name: prod-cluster, description: Production Kubernetes cluster }
spec: { type: cluster, owner: group:default/team-platform, system: rl-platform }
---
# The practice, as a catalog citizen (design §3.4 paved-road loop): a Component
# of type `practice`, owned by the steward gildi. Its home repo holds the
# standard, the paved road, and the remediation vísar together — and the links
# below ARE the practice→standard→trials tie, one click from the entity page.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: security-practice
  description: 'The Security practice: its standard, paved road, and remediation vísar'
  annotations:
    siliconsaga.org/aspect: 'security'
    siliconsaga.org/visir: './repos/security-practice/docs/runbooks/rotate-leaked-credential.md'
    backstage.io/techdocs-ref: dir:./repos/security-practice
  links:
    - url: https://github.com/SiliconSaga/leidangr/blob/main/examples/mock-org/repos/security-practice/standard.yaml
      title: Security standard — trials in tiers (bronze/silver/gold)
    - url: https://github.com/SiliconSaga/leidangr/blob/main/examples/mock-org/repos/security-practice/pipeline-templates/dependency-scan.yml
      title: Paved road — dependency-scan pipeline template
    - url: https://github.com/SiliconSaga/leidangr/blob/main/examples/mock-org/repos/security-practice/docs/dependency-scanning.md
      title: Remediation — dependency scanning
    - url: https://github.com/SiliconSaga/leidangr/blob/main/examples/mock-org/repos/security-practice/docs/runbooks/rotate-leaked-credential.md
      title: Runbook — rotate a leaked credential
spec: { type: practice, lifecycle: production, owner: group:default/security-gildi, system: rl-platform }
---
# The portal itself, cataloged — the one NON-fiction entity in the Ravenline
# seed: this is the Backstage instance you are browsing, owned by the DevEx
# team, and its vísir is the demo/onboarding grand tour.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: guildhall-portal
  description: 'This Backstage instance — the Guildhall portal (yes, the one you are looking at)'
  annotations:
    siliconsaga.org/visir: '../../docs/demo-visir.md'
  links:
    - url: https://github.com/SiliconSaga/leidangr/blob/main/docs/demo-visir.md
      title: Grand tour vísir (start here)
    - url: https://github.com/SiliconSaga/leidangr/blob/main/docs/plans/2026-07-10-guilds-skills-standards-design.md
      title: Guildhall design doc
spec: { type: portal, lifecycle: production, owner: group:default/team-devex, system: rl-platform }
