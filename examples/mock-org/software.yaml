---
# Ravenline software graph — built-in kinds only. Aspect enrollment and vísir
# references ride annotations (design §5): inert today, consumed by the future
# scorecard/runbooks plugins.
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata: { name: ravenline }
spec: { owner: group:default/ravenline }
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: parcel-tracking, description: Parcel tracking product }
spec: { owner: group:default/team-tracking, domain: ravenline }
---
# tracking-api lives in its own repo's catalog-info.yaml (live topology —
# see repos/tracking-api/catalog-info.yaml, registered in app-config).
apiVersion: backstage.io/v1alpha1
kind: Component
metadata: { name: tracking-web, description: Customer-facing tracking page }
spec: { type: website, lifecycle: production, owner: group:default/team-tracking, system: parcel-tracking }
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: shipping, description: Shipping orchestration product }
spec: { owner: group:default/team-shipping, domain: ravenline }
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: shipping-orchestrator
  description: 'Books carriers, prints labels. Security standard: silver.'
  annotations:
    siliconsaga.org/aspects: 'security'
spec: { type: service, lifecycle: production, owner: group:default/team-shipping, system: shipping }
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: carrier-gateway
  description: 'Adapters for carrier APIs. Security standard: bronze — dependency-scanning trial failing; remediation = adopt the paved-road pipeline template.'
  annotations:
    siliconsaga.org/aspects: 'security'
spec: { type: service, lifecycle: production, owner: group:default/team-shipping, system: shipping }
---
# Pristine and unenrolled — the graft's demo target: apply the Security aspect
# to it via the scaffolder Template (portal door) or SKILL.md (agent door) in
# repos/security-aspect/.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: label-service
  description: 'Prints shipping labels. Not yet enrolled in any aspect — graft me.'
spec: { type: service, lifecycle: production, owner: group:default/team-shipping, system: shipping }
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: rl-platform, description: Shared platform }
spec: { owner: group:default/team-platform, domain: ravenline }
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata: { name: prod-cluster, description: Production Kubernetes cluster }
spec: { type: cluster, owner: group:default/team-platform, system: rl-platform }
---
# NOTE: the security-practice Component lives in the aspect repo's
# catalog-info.yaml (live topology — see repos/security-aspect/, registered in
# app-config alongside the graft template.yaml).
#
# guild-hall (type:hub) lives in the repo root catalog-info.yaml (registered
# separately in app-config) so its backstage.io/techdocs-ref: dir:. resolves
# to the root mkdocs.yml — TechDocs dir: refs cannot traverse up past the
# entity file's own directory.
