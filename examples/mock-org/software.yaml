---
# Ravenline software graph — built-in kinds only. Aspect enrollment and vísir
# references ride annotations (design §5): inert today, consumed by the future
# scorecard/runbooks plugins.
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata: { name: ravenline }
spec: { owner: group:default/ravenline }
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: parcel-tracking, description: Parcel tracking product }
spec: { owner: group:default/team-tracking, domain: ravenline }
---
# tracking-api lives in its own repo's catalog-info.yaml (live topology —
# see repos/tracking-api/catalog-info.yaml, registered in app-config).
apiVersion: backstage.io/v1alpha1
kind: Component
metadata: { name: tracking-web, description: Customer-facing tracking page }
spec: { type: website, lifecycle: production, owner: group:default/team-tracking, system: parcel-tracking }
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: shipping, description: Shipping orchestration product }
spec: { owner: group:default/team-shipping, domain: ravenline }
---
# The already-grafted story component: enrollment is a RECORD of application.
# aspect-versions pins the adopted module version; graft-record keeps the PR
# that applied it (.example host — demo fiction). Both annotations are inert
# today; their shape is tentative until the scorecard engine consumes them.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: shipping-orchestrator
  description: 'Books carriers, prints labels. Security standard: silver — grafted May 2026, silver on the next pipeline run.'
  annotations:
    siliconsaga.org/aspects: 'security'
    siliconsaga.org/aspect-versions: 'security@1.4'
    siliconsaga.org/graft-record: 'security: https://git.ravenline.example/shipping/shipping-orchestrator/pull/412'
spec: { type: service, lifecycle: production, owner: group:default/team-shipping, system: shipping }
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: carrier-gateway
  description: 'Adapters for carrier APIs. Security standard: bronze — enrolled pre-paved-road (module 1.2, hand-rolled pipeline config); dependency-scanning trial failing; remediation = adopt the paved-road pipeline template.'
  annotations:
    siliconsaga.org/aspects: 'security'
    siliconsaga.org/aspect-versions: 'security@1.2'
spec: { type: service, lifecycle: production, owner: group:default/team-shipping, system: shipping }
---
# Pristine and unenrolled — the graft's demo target: apply the Security aspect
# to it via the scaffolder Template (Create-page door) or SKILL.md (agent door)
# in repos/security-aspect/.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: label-service
  description: 'Prints shipping labels. Not yet enrolled in any aspect — graft me.'
spec: { type: service, lifecycle: production, owner: group:default/team-shipping, system: shipping }
---
# Foxholm's software — the practice-reuse beat: the SAME security standard,
# stewarded by the SAME gildi, applied across a department boundary.
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: returns-logistics, description: 'Foxholm returns & recycling flows' }
spec: { owner: group:default/team-returns, domain: ravenline }
---
# Reuse success: grafted during acquisition onboarding via the same Create-page
# door — same-day enrollment, silver two pipeline runs later.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: refund-service
  description: 'Handles refund workflows. Security standard: silver — grafted June 2026 during Foxholm onboarding.'
  annotations:
    siliconsaga.org/aspects: 'security'
    siliconsaga.org/aspect-versions: 'security@1.4'
    siliconsaga.org/graft-record: 'security: https://git.foxholm.example/returns/refund-service/pull/57'
spec: { type: service, lifecycle: production, owner: group:default/team-returns, system: returns-logistics }
---
# The drive's remaining Foxholm laggard: legacy build image from before the
# acquisition, module one release behind.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: intake-scanner
  description: 'Scans inbound return parcels. Security standard: bronze — legacy build image; needs the paved-road include plus an image bump.'
  annotations:
    siliconsaga.org/aspects: 'security'
    siliconsaga.org/aspect-versions: 'security@1.3'
spec: { type: service, lifecycle: production, owner: group:default/team-returns, system: returns-logistics }
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata: { name: rl-platform, description: Shared platform }
spec: { owner: group:default/team-platform, domain: ravenline }
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata: { name: prod-cluster, description: Production Kubernetes cluster }
spec: { type: cluster, owner: group:default/team-platform, system: rl-platform }
---
# NOTE: the security-practice Component lives in the aspect repo's
# catalog-info.yaml (live topology — see repos/security-aspect/, registered in
# app-config alongside the graft template.yaml).
#
# guild-hall (type:hub) lives in the repo root catalog-info.yaml (registered
# separately in app-config) so its backstage.io/techdocs-ref: dir:. resolves
# to the root mkdocs.yml — TechDocs dir: refs cannot traverse up past the
# entity file's own directory.
