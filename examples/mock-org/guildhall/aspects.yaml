# Aspect REGISTRY — maps aspect ids to their modules (design §3.2 as amended:
# an aspect is a versioned module — a repo of technical resources; the practice
# is the living institution around it). NOT catalog entities. Enrollment is the
# siliconsaga.org/aspects annotation on the enrolled entity (see
# ../software.yaml). Paths are relative to THIS file; version pins land here
# when module versioning gets real.
aspects:
  - id: security
    description: Services uphold the security bar; the practice ships the paved road that clears it.
    steward: group:default/security-gildi
    module: ../repos/security-aspect
    # Current module release. 1.2 = pre-paved-road era (hand-rolled pipeline
    # config); 1.4 (2026-04) refreshed the dependency-scan template and added
    # the 30-day critical-vulns clock. Enrolled components record what they
    # adopted via the siliconsaga.org/aspect-versions annotation — the gap
    # between this number and theirs is what an adoption drive closes.
    version: '1.4'
    standards:
      - ../repos/security-aspect/standard.yaml
  - id: operational-readiness
    description: Releases and services are ready to run — the software twin of season-readiness.
    steward: null # an aspect can exist before a gildi forms around its practice (design §3.2)
    standards:
      - ./standards/release-readiness.yaml
