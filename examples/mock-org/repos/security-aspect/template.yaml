# The scaffolder graft — the portal-user front door for applying this aspect
# (design §3.7). A typed Backstage Template: running it IS the weaving. This
# mock edition logs its weave plan via debug:log instead of opening a real PR,
# consistent with the seed's designed-not-executed honesty; a live edition
# swaps the log steps for fetch + publish:github/gitlab:merge-request actions.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: apply-security-aspect
  title: Apply the Security aspect
  description: Enroll a component in the Security aspect — adds the enrollment annotation, adopts the paved-road pipeline templates, and scaffolds the stewardship stubs. The agent-side door is this repo's SKILL.md.
  annotations:
    siliconsaga.org/aspect: 'security'
  links:
    - url: https://github.com/SiliconSaga/leidangr/blob/main/examples/mock-org/repos/security-aspect/standard.yaml
      title: The standard this graft works toward
spec:
  owner: group:default/security-gildi
  type: aspect
  parameters:
    - title: Target
      required: [component]
      properties:
        component:
          title: Target component (entity ref)
          type: string
          description: e.g. component:default/label-service
        facets:
          title: Facets override (optional)
          type: string
          description: Comma-separated; leave empty to accept the spec.type defaults (service→api, website→web-ui)
  steps:
    - id: plan
      name: Log the weave plan
      action: debug:log
      input:
        message: |
          Would graft the Security aspect onto ${{ parameters.component }}:
            1. add siliconsaga.org/aspects: security to its catalog-info.yaml
            2. add siliconsaga.org/facets: ${{ parameters.facets }} (if overriding type defaults)
            3. add the paved-road includes (dependency-scan.yml, sast-scan.yml) to its CI
            4. scaffold the stewardship stubs (security contact annotation, threat-model file)
            5. open a PR against the target repo with all of the above
          The enrollment annotation is the record of application; the next
          pipeline run's facts flip the bronze trials green.
