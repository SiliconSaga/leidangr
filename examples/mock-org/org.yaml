---
# Ravenline org tree — organization → department → team (typed Group tree,
# same discipline as the MTL seed's organization → sport → division → team).
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: ravenline
  description: Ravenline — parcel-logistics SaaS (mock org, Guildhall demo)
spec:
  type: organization
  children: [rl-engineering, foxholm, security-gildi, release-captains-gildi]
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata: { name: rl-engineering }
spec: { type: department, parent: ravenline, children: [team-tracking, team-shipping, team-platform, team-devex] }
---
# Foxholm — second department (returns & recycling logistics), acquired 2026.
# Exists to make practice REUSE concrete: same security standard, same gildi
# stewardship, shared remediation docs, one Group tree (= shared rollups later).
# The acquisition also explains its maturity gap in the drive narrative.
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: foxholm
  description: 'Foxholm — returns & recycling logistics, acquired 2026, onboarding to Ravenline practices'
spec: { type: department, parent: ravenline, children: [team-returns] }
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata: { name: team-returns }
spec: { type: team, parent: foxholm, children: [] }
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata: { name: team-tracking }
spec: { type: team, parent: rl-engineering, children: [] }
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata: { name: team-shipping }
spec: { type: team, parent: rl-engineering, children: [] }
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata: { name: team-platform }
spec: { type: team, parent: rl-engineering, children: [] }
---
# DevEx — the team that runs the instance itself. Owns guild-hall (repo-root
# catalog-info.yaml) and stewards the demo/onboarding vísir new users start from.
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: team-devex
  description: 'Developer experience — maintains this Backstage instance and onboards its users'
spec: { type: team, parent: rl-engineering, children: [] }
---
# Gildi — the Guildhall's fellowship concept (design §3.2/§5): plain
# typed Groups, cross-cutting the team tree. What a gildi stewards is an
# annotation, not a new relation type.
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: security-gildi
  title: Security guild
  description: The Security guild — stewards the security aspect (aspect-aligned gildi)
  annotations:
    siliconsaga.org/stewards: 'aspect:security'
  links: # the practice→standard tie, one click from the guild's page
    - url: https://github.com/SiliconSaga/leidangr/blob/main/examples/mock-org/repos/security-aspect/standard.yaml
      title: Security standard (blocks of trials, tiered)
    - url: https://github.com/SiliconSaga/leidangr/blob/main/examples/mock-org/repos/security-aspect/template.yaml
      title: Adoption — Apply the Security aspect
spec:
  type: guild
  parent: ravenline
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: release-captains-gildi
  title: Release Captains
  description: The Release Captains guild — stewards the release-captain craft (craft-aligned gildi)
  annotations:
    siliconsaga.org/stewards: 'craft:release-captain'
spec:
  type: guild
  parent: ravenline
  children: []
---
# People — membership carries both team and gildi affiliation via memberOf.
# Skill profiles are NOT entity fields: see guildhall/skills.yaml.
apiVersion: backstage.io/v1alpha1
kind: User
metadata: { name: astrid, description: 'Platform engineer, security-inclined' }
spec: { memberOf: [team-platform, security-gildi] }
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata: { name: bjorn, description: 'Shipping engineer, runs releases' }
spec: { memberOf: [team-shipping, release-captains-gildi] }
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata: { name: runa, description: 'Tracking engineer, writes the sagas' }
spec: { memberOf: [team-tracking, release-captains-gildi] }
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata: { name: leif, description: 'Tracking engineer, learning threat modeling' }
spec: { memberOf: [team-tracking, security-gildi] }
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata: { name: sigrid, description: 'Shipping engineer' }
spec: { memberOf: [team-shipping] }
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata: { name: egil, description: 'Platform engineer' }
spec: { memberOf: [team-platform] }
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata: { name: freya, description: 'DevEx engineer — runs the instance, gives the tours' }
spec: { memberOf: [team-devex] }
---
# Cross-department gildi membership — the guild spans org boundaries.
apiVersion: backstage.io/v1alpha1
kind: User
metadata: { name: dagny, description: 'Foxholm returns engineer, joined the security guild during onboarding' }
spec: { memberOf: [team-returns, security-gildi] }
