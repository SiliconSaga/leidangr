# Aspect vocabulary — the cross-cutting concerns (design §3.2): each holds
# standards applied to enrolled entities. Vocabulary-first; NOT catalog
# entities. Enrollment is the siliconsaga.org/aspects annotation on the
# enrolled entity (see ../software.yaml).
aspects:
  - id: security
    description: Services uphold the security bar; the gildi ships the paved road that clears it.
    steward: group:default/security-gildi
    home: ./repos/security-practice
    standards:
      - ./repos/security-practice/standard.yaml
  - id: operational-readiness
    description: Releases and services are ready to run — the software twin of season-readiness.
    steward: null # an aspect can exist before a gildi forms around it (design §3.2)
    standards:
      - ./practice-layer/standards/release-readiness.yaml
